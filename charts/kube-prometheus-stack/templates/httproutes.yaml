{{- if .Values.httproutes.enabled }}
{{- if .Values.httproutes.alertmanager_enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kube-prometheus-stack-alertmanager
spec:
  parentRefs:
    - name: {{ .Values.httproutes.gateway_name | default "istio-gateway" }}
      namespace: {{ .Values.httproutes.gateway_namespace | default "istio-ingress" }}
      sectionName: https
  hostnames:
    - {{ .Values.httproutes.alertmanager_host | quote }}
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9095
{{- end }}
{{- if .Values.httproutes.prometheus_enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kube-prometheus-stack-prometheus
spec:
  parentRefs:
    - name: {{ .Values.httproutes.gateway_name | default "istio-gateway" }}
      namespace: {{ .Values.httproutes.gateway_namespace | default "istio-ingress" }}
      sectionName: https
  hostnames:
    - {{ .Values.httproutes.prometheus_host | quote }}
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9091
{{- end }}
{{- if .Values.httproutes.grafana_enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kube-prometheus-stack-grafana
spec:
  parentRefs:
    - name: {{ .Values.httproutes.gateway_name | default "istio-gateway" }}
      namespace: {{ .Values.httproutes.gateway_namespace | default "istio-ingress" }}
      sectionName: https
  hostnames:
    - {{ .Values.httproutes.grafana_host | quote }}
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
{{- end }}
{{- end }}
